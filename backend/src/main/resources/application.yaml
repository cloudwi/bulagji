server:
  port: ${PORT:8080}

spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health

bulagji:
  cors-origins: ${CORS_ORIGINS:http://localhost:5173,https://bulagji.vercel.app}
